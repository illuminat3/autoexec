// Sounds
alias roll "play ui/panorama/sidemenu_rollover_02.wav"
alias welcome "play sounds/music/3kliksphilip_01/wonround.vsnd_c"

// Better Interact
alias +interact "+use; roll"
alias -interact "-use"

// Weapon Hand Pull Out
alias rightknife "slot3; switchhandsright"
alias leftprimary "slot1; switchhandsleft"
alias leftsecondary "slot2; switchhandsleft"
alias rightflash "slot7; switchhandsright"
alias rightsmoke "slot8; switchhandsright"
alias rightmolotov "slot10; switchhandsright"
alias righthe "slot6; switchhandsright"
alias rightdecoy "slot9; switchhandsright"
alias rightc4 "slot5; switchhandsright"
alias righttaser "slot12; switchhandsright"

// Clutch Mode
// i dislike cl_clutch_mode as it has not worked before.
alias clutch-mode "clutch-on"
alias clutch-on "voice_enable 0; cl_chatfilters 0; cl_mute_enemy_team 1; echo Clutch Mode Enabled!; alias clutch-mode clutch-off"
alias clutch-off "voice_enable 1; cl_chatfilters 63; cl_mute_enemy_team 0; echo Clutch Mode Disabled!; alias clutch-mode clutch-on"

// Quickswitch
alias +quick-switch "slot3"
alias -quick-switch "lastinv"

// Better Scoreboard
alias +scoreboard "+showscores; cl_hud_telemetry_frametime_show 2; cl_hud_telemetry_ping_show 2"
alias -scoreboard "-showscores; cl_hud_telemetry_frametime_show 0; cl_hud_telemetry_ping_show 0"

// Bomb Drop
alias +bomb-drop "slot3; slot5"
alias -bomb-drop "drop"

// Fast Forward
alias +fastforward "demo_timescale 8"
alias -fastforward "demo_timescale 1"

// Slow Motion
alias +slowmotion "demo_timescale 0.25"
alias -slowmotion "demo_timescale 1"

// Pause/Play
alias pause-toggle "demopause"
alias demopause "demo_pause; alias pause-toggle demoplay"
alias demoplay "demo_resume; alias pause-toggle demopause"

// Misc Shortcut
alias d "disconnect"
alias q "quit"
alias r "retry"

// Volume
alias loud "volume 0.67"
alias quiet "volume .01"

// Demo Xray
alias "xrayon" "spec_show_xray 1; alias xraytoggle xrayoff"
alias "xrayoff" "spec_show_xray 0; alias xraytoggle xrayon"
alias "xraytoggle" "xrayon"